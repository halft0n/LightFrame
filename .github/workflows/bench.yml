name: Performance Regression Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: Benchmark Regression Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: bench

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - run: pnpm install
      - run: pnpm build

      - name: Run benchmarks
        run: cargo bench --workspace 2>&1 | tee bench-full-output.txt

      - name: Extract Criterion results for benchmark-action
        run: |
          python3 -c "
          import re, json

          results = []
          with open('bench-full-output.txt') as f:
              for line in f:
                  m = re.match(r'^(\S+)\s+time:\s+\[[\d.]+ \S+ ([\d.]+) (\S+) [\d.]+ \S+\]', line)
                  if m:
                      name, value, unit = m.group(1), float(m.group(2)), m.group(3)
                      if 'µs' in unit or 'us' in unit:
                          value *= 1000
                      elif 'ms' in unit:
                          value *= 1_000_000
                      elif unit == 's':
                          value *= 1_000_000_000
                      results.append({'name': name, 'unit': 'ns', 'value': value})

          with open('bench-output.json', 'w') as f:
              json.dump(results, f, indent=2)
          print(f'Extracted {len(results)} benchmark results')
          "

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: LightFrame Benchmarks
          tool: customSmallerIsBetter
          output-file-path: bench-output.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          alert-threshold: '110%'
          comment-on-alert: true
          fail-on-alert: false
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
