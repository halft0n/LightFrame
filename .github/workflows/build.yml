name: Build & Test

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - run: pnpm install
      - run: pnpm build
      - run: cargo test --workspace

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm test

  build:
    name: Build ${{ matrix.label }}
    needs: [test-rust, test-frontend]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-amd64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle_paths: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - label: linux-amd64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle_paths: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage
          - label: macos-amd64
            os: macos-latest
            target: x86_64-apple-darwin
            bundle_paths: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - label: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            bundle_paths: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.label }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - run: pnpm install

      - name: Build (native target)
        if: "!contains(matrix.label, 'arm64')"
        run: pnpm tauri build

      - name: Build (cross-compile arm64)
        if: contains(matrix.label, 'arm64')
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Rename artifacts with version and platform
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          LABEL="${{ matrix.label }}"
          mkdir -p dist

          for f in $(find src-tauri/target -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.dmg" \) 2>/dev/null); do
            BASENAME="$(basename "$f")"
            EXT="${BASENAME##*.}"
            NAME="${BASENAME%.*}"
            NEW_NAME="CatchLight-${VERSION}-${LABEL}.${EXT}"
            cp "$f" "dist/${NEW_NAME}"
            echo "  => dist/${NEW_NAME}"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: catchlight-${{ matrix.label }}
          path: dist/*
          retention-days: 30

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release files
        run: find artifacts -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            ## CatchLight ${{ github.ref_name }}

            ### Downloads
            | Platform | Architecture | File |
            |----------|-------------|------|
            | Windows | amd64 | `.msi` / `.exe` |
            | Linux | amd64 | `.deb` / `.AppImage` |
            | macOS | amd64 | `.dmg` |
            | macOS | arm64 | `.dmg` |
