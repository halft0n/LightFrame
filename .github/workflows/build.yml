name: Build & Test

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test-rust:
    name: Rust Tests (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - run: pnpm install
      - run: pnpm build
      - name: Check formatting (Linux only)
        if: runner.os == 'Linux'
        run: cargo fmt --check
      - run: cargo test --workspace
      - run: cargo clippy --workspace -- -D warnings

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm test

  lint-frontend:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: npx tsc --noEmit

  build:
    name: Build ${{ matrix.label }}
    needs: [test-rust, test-frontend, lint-frontend]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-amd64
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - label: linux-amd64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - label: macos-amd64
            os: macos-latest
            target: x86_64-apple-darwin
          - label: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.label }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf fuse libfuse2 file

      - run: pnpm install

      - name: Verify version alignment
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CONF_VERSION=$(grep -o '"version": "[^"]*"' src-tauri/tauri.conf.json | head -1 | cut -d'"' -f4)
          PKG_VERSION=$(grep -o '"version": "[^"]*"' package.json | head -1 | cut -d'"' -f4)
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)

          ERR=0
          if [ "$TAG_VERSION" != "$CONF_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) doesn't match tauri.conf.json ($CONF_VERSION)"
            ERR=1
          fi
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) doesn't match package.json ($PKG_VERSION)"
            ERR=1
          fi
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) doesn't match Cargo.toml ($CARGO_VERSION)"
            ERR=1
          fi
          exit $ERR

      - name: Verify AppImage tooling (linuxdeploy)
        if: runner.os == 'Linux'
        run: |
          pnpm tauri build --help | grep -i appimage || true
          echo "Tauri bundles AppImage via linuxdeploy (downloaded automatically during build)"

      - name: Build (native target)
        if: "!contains(matrix.label, 'arm64')"
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

      - name: Build (cross-compile arm64)
        if: contains(matrix.label, 'arm64')
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Collect release artifacts
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          LABEL="${{ matrix.label }}"
          mkdir -p release-artifacts

          # Search in the correct workspace target directory
          SEARCH_DIR="target/release/bundle"
          if [[ "$LABEL" == *"arm64"* ]]; then
            SEARCH_DIR="target/${{ matrix.target }}/release/bundle"
          fi

          echo "Searching for artifacts in: $SEARCH_DIR"

          if [ -d "$SEARCH_DIR" ]; then
            # Collect platform-specific installers (not raw binaries)
            for f in $(find "$SEARCH_DIR" -type f \( -name "*.msi" -o -name "*-setup.exe" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "*.dmg" \) 2>/dev/null); do
              BASENAME="$(basename "$f")"
              EXT="${BASENAME##*.}"
              NEW_NAME="LightFrame-${VERSION}-${LABEL}.${EXT}"
              cp "$f" "release-artifacts/${NEW_NAME}"
              echo "  => release-artifacts/${NEW_NAME}"
            done

            # Collect updater bundles and signatures when signing keys are configured
            if [ -n "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
              mkdir -p "release-artifacts/updater/${LABEL}"
              for f in $(find "$SEARCH_DIR" -type f \( -name "*.sig" -o -name "*.nsis.zip" -o -name "*.app.tar.gz" -o -name "*.AppImage.tar.gz" \) 2>/dev/null); do
                BASENAME="$(basename "$f")"
                cp "$f" "release-artifacts/updater/${LABEL}/${BASENAME}"
                echo "  => release-artifacts/updater/${LABEL}/${BASENAME}"
              done
            fi
          else
            echo "WARNING: Bundle directory not found: $SEARCH_DIR"
            find target -type d -name "bundle" 2>/dev/null || echo "No bundle directories found"
          fi

          echo "=== Collected artifacts ==="
          ls -la release-artifacts/ 2>/dev/null || echo "No artifacts collected"

      - uses: actions/upload-artifact@v4
        with:
          name: lightframe-${{ matrix.label }}
          path: release-artifacts/**
          retention-days: 30
          if-no-files-found: warn

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release files
        run: |
          echo "=== Release artifacts ==="
          find artifacts -type f | sort || echo "No artifacts found"

      - name: Generate latest.json for auto-updater
        if: always()
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO="${{ github.repository }}"
          PUB_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          RELEASE_URL="https://github.com/${REPO}/releases/download/${GITHUB_REF_NAME}"

          declare -A PLATFORM_MAP=(
            ["windows-amd64"]="windows-x86_64"
            ["linux-amd64"]="linux-x86_64"
            ["macos-amd64"]="darwin-x86_64"
            ["macos-arm64"]="darwin-aarch64"
          )

          declare -A INSTALLER_MAP=(
            ["windows-amd64"]="LightFrame-${VERSION}-windows-amd64-setup.exe"
            ["linux-amd64"]="LightFrame-${VERSION}-linux-amd64.AppImage"
            ["macos-amd64"]="LightFrame-${VERSION}-macos-amd64.dmg"
            ["macos-arm64"]="LightFrame-${VERSION}-macos-arm64.dmg"
          )

          PLATFORMS="{}"
          for label_dir in artifacts/updater/*/; do
            [ -d "$label_dir" ] || continue
            label="$(basename "$label_dir")"
            platform="${PLATFORM_MAP[$label]:-}"
            [ -n "$platform" ] || continue

            sig_file=""
            for sig in "$label_dir"*.sig; do
              [ -f "$sig" ] || continue
              sig_file="$sig"
              break
            done
            [ -n "$sig_file" ] || continue

            signature="$(cat "$sig_file")"
            installer_name="${INSTALLER_MAP[$label]:-}"
            if [ -n "$installer_name" ] && find artifacts -name "$installer_name" -type f | grep -q .; then
              download_url="${RELEASE_URL}/${installer_name}"
            else
              bundle_file="${sig_file%.sig}"
              download_url="${RELEASE_URL}/$(basename "$bundle_file")"
            fi

            PLATFORMS="$(echo "$PLATFORMS" | jq \
              --arg platform "$platform" \
              --arg url "$download_url" \
              --arg signature "$signature" \
              '. + {($platform): {url: $url, signature: $signature}}')"
          done

          if [ "$(echo "$PLATFORMS" | jq 'length')" -eq 0 ]; then
            echo "No signed updater platforms found; skipping latest.json"
            exit 0
          fi

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: "", pub_date: $pub_date, platforms: $platforms}' \
            > artifacts/latest.json

          echo "=== Generated latest.json ==="
          cat artifacts/latest.json

      - name: Flatten updater bundles for release upload
        run: |
          find artifacts -type f -path "*/updater/*" | while read -r f; do
            cp "$f" "artifacts/$(basename "$f")"
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            ## LightFrame ${{ github.ref_name }}

            ### Downloads
            | Platform | Architecture | File |
            |----------|-------------|------|
            | Windows | amd64 | `.msi` / `.exe` |
            | Linux | amd64 | `.deb` / `.rpm` / `.AppImage` |
            | macOS | amd64 | `.dmg` |
            | macOS | arm64 | `.dmg` |
